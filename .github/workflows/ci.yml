name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: 22


jobs:
  lint-and-typecheck:
    name: Lint (Biome) + Typecheck (tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack (pnpm via packageManager field)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm --filter @cv/db generate
      - name: Lint (Biome)
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck

  module-boundaries:
    name: Module boundary enforcement (T030a — Principe V)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack (pnpm via packageManager field)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check module boundaries
        run: pnpm exec tsx tools/check-module-boundaries.ts
      - name: Check anti-marketplace (feature 007 — Principe I + ADR-0002 + SC-002)
        run: pnpm exec tsx tools/check-no-contact-fields-profile.ts
      - name: Check anti-énumération profil (feature 007 — SC-003)
        run: pnpm exec tsx tools/check-anti-enum-profile.ts
      - name: Check feature boundaries front (Principe VIII.a §6 — pas de deep cross-feature import)
        run: pnpm exec tsx tools/check-feature-boundaries.ts

  test:
    name: Tests (Vitest unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cv_dev
          POSTGRES_PASSWORD: cv_dev
          POSTGRES_DB: cv_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cv_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://cv_dev:cv_dev@localhost:5432/cv_dev
      REDIS_URL: redis://localhost:6379
      # MFA KEK (feature 005, T006) — 32 octets de zéro encodés base64,
      # uniquement pour environnement CI/test. La validation au startup
      # d'apps/api refuse cette valeur si NODE_ENV=production.
      MFA_KEK_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      # Auth token secret (feature 006) — JoseTokenIssuer + tests intégration
      # qui chargent env.ts (ex. PrismaProfilPublicReader via setup.ts dotenv).
      # 32 octets zéro placeholder, refusé en NODE_ENV=production.
      AUTH_TOKEN_SECRET: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack (pnpm via packageManager field)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm --filter @cv/db generate
      - name: Apply Prisma migrations
        run: pnpm --filter @cv/db exec prisma migrate deploy --schema=./prisma/schema
      - name: Run tests
        run: pnpm test

  build:
    name: Build (Turbo)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Build-time DATABASE_URL : Next.js `next build` collecte les page
      # data en mode production, ce qui exécute le code Server Components.
      # Prisma reste paresseux côté connexion — l'URL n'a besoin que
      # d'être parsable, pas réellement connectable.
      DATABASE_URL: postgresql://build:build@localhost:5432/build
      # Auth.js v5 exige AUTH_SECRET au build (sinon throws). Valeur
      # bidon — la vraie viendra d'AWS Secrets Manager en prod runtime.
      AUTH_SECRET: build-time-placeholder-32-chars-min-required
      # MFA KEK (feature 005, T006) — placeholder build-time. La validation
      # runtime refuse cette valeur si NODE_ENV=production.
      MFA_KEK_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack (pnpm via packageManager field)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm --filter @cv/db generate
      - name: Build all packages
        run: pnpm build

  sca-scan:
    name: Security — SCA (pnpm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # SCA bloque uniquement sur les CVE CRITICAL pour ne pas bloquer la
    # release alpha de la feature 001. Les advisories HIGH actuellement
    # ouverts (fastify, @fastify/middie, @nestjs/platform-fastify,
    # @opentelemetry/sdk-node) demandent des major upgrades de la stack
    # NestJS 10 → 11 + Fastify 4 → 5 traités en lot dans un follow-up
    # dédié (cf. docs/security/sca-tracking.md). À durcir à `high` une
    # fois ces upgrades faits.
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack (pnpm via packageManager field)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: pnpm audit (blocks on CRITICAL CVE)
        run: pnpm audit --audit-level=critical --prod || (echo "::warning ::HIGH+ vulnerabilities exist — see docs/security/sca-tracking.md" && exit 0)

      # Snyk : à activer une fois le secret SNYK_TOKEN configuré (Principe IX)
      # - name: Snyk Open Source scan
      #   uses: snyk/actions/node@master
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      #   with:
      #     args: --severity-threshold=high --all-projects

  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack (pnpm via packageManager field)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check licenses
        # `--excludePrivatePackages` ignore les workspaces internes (@cv/*)
        # marqués `private: true` — ils n'ont pas de license publique par
        # design. Le check s'applique aux deps externes uniquement.
        #
        # Version pinnée 4.x : la 5.x exige Node >= 24 (engines.node),
        # incompatible avec NODE_VERSION=22. À débloquer si bump Node 24.
        run: |
          pnpm dlx license-checker-rseidelsohn@4 \
            --production \
            --excludePrivatePackages \
            --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;MPL-2.0;CC0-1.0;CC-BY-4.0;CC-BY-3.0;Unlicense;0BSD;Python-2.0;BlueOak-1.0.0"

  a11y:
    name: A11y — Playwright + axe-core (Principe XI WCAG 2.1 AA)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cv_dev
          POSTGRES_PASSWORD: cv_dev
          POSTGRES_DB: cv_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cv_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # Mêmes variables que le job build pour permettre `next build` + start.
      DATABASE_URL: postgresql://cv_dev:cv_dev@localhost:5432/cv_dev
      AUTH_SECRET: ci-time-placeholder-32-chars-min-required
      MFA_KEK_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      AUTH_TOKEN_SECRET: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      E2E_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm --filter @cv/db generate
      - name: Apply Prisma migrations
        run: pnpm --filter @cv/db exec prisma migrate deploy --schema=./prisma/schema
      - name: Build all packages (Turbo — résout l'ordre workspace deps)
        run: pnpm build
      - name: Install Playwright Chromium
        run: pnpm --filter @cv/web exec playwright install --with-deps chromium
      - name: Start Next.js production server
        run: pnpm --filter @cv/web exec next start -p 3000 &
        env:
          NODE_ENV: production
      - name: Wait until server ready
        run: |
          for i in {1..60}; do
            if curl -sf -o /dev/null http://localhost:3000/fr/comment-ca-marche; then
              echo "Server ready"; exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready in 120s"
          exit 1
      - name: Run a11y tests (Playwright @a11y)
        run: pnpm --filter @cv/web test:a11y

  lighthouse:
    name: Lighthouse CI (Principe XII Perf ≥ 90 / SEO ≥ 95 / A11y ≥ 95)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cv_dev
          POSTGRES_PASSWORD: cv_dev
          POSTGRES_DB: cv_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cv_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://cv_dev:cv_dev@localhost:5432/cv_dev
      AUTH_SECRET: ci-time-placeholder-32-chars-min-required
      MFA_KEK_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      AUTH_TOKEN_SECRET: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm --filter @cv/db generate
      - name: Apply Prisma migrations
        run: pnpm --filter @cv/db exec prisma migrate deploy --schema=./prisma/schema
      - name: Build all packages (Turbo — résout l'ordre workspace deps)
        run: pnpm build
      - name: Start Next.js production server
        run: pnpm --filter @cv/web exec next start -p 3000 &
        env:
          NODE_ENV: production
      - name: Wait until server ready
        run: |
          for i in {1..60}; do
            if curl -sf -o /dev/null http://localhost:3000/fr/comment-ca-marche; then
              echo "Server ready"; exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready in 120s"
          exit 1
      - name: Lighthouse CI (autorun avec asserts bloquants)
        # Utilise pnpm dlx (pattern license-check) — pas de devDep ajoutée.
        # Asserts dans apps/web/lighthouserc.json :
        #   - Perf  ≥ 0.9 (Principe XII)
        #   - SEO   ≥ 0.95
        #   - A11y  ≥ 0.95
        #   - LCP   ≤ 2500ms
        #   - CLS   ≤ 0.1
        # Échec sur assertion = exit code non-zero → job rouge.
        run: pnpm dlx @lhci/cli@0.14.x autorun --config=apps/web/lighthouserc.json
